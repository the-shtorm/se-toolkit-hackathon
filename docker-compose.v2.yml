version: '3.9'

# Version 2: Production deployment with Nginx, Celery Beat
# Usage: docker-compose -f docker-compose.yml -f docker-compose.v2.yml up -d

services:
  # Nginx reverse proxy (production)
  nginx:
    build: ./nginx
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    profiles:
      - production

  # Celery Beat (scheduler for recurring tasks)
  celery-beat:
    build: ./backend
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://user:password@db:5432/notifications}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - JWT_SECRET=${JWT_SECRET:-your_jwt_secret_key_change_in_production}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:80,http://localhost:3000}
    depends_on:
      - db
      - redis
    command: celery -A app.celery_app.celery_app beat --loglevel=info
    restart: unless-stopped

  # Flower - Celery monitoring dashboard (optional)
  flower:
    build: ./backend
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      - redis
    ports:
      - "5555:5555"
    command: celery -A app.celery_app.celery_app flower --port=5555
    restart: unless-stopped
    profiles:
      - monitoring
